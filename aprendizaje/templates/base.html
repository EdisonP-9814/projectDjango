{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Tienda de Videojuegos{% endblock %}</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sh384-..." crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Scripts -->
    <script src="{% static 'js/script.js' %}"></script>
</head>
<body class="bg-body text-body">
    <header>
        <div class="ms-auto"> 
        <button id="theme-toggle" class="btn btn-outline-secondary"> <i class="fa-solid fa-moon"></i> </button>
        </div>
    </header>
    
    {% block content %}

    {% endblock %}

    <footer class="text-center mt-5 mb-3">
        <p>2026 tienda de video juegos</p>
        <a href="{% url 'home' %}" class="text-body">inicio</a>
        <a href="{% url 'contacto' %}" class="text-body ms-3">contacto</a>
    </footer>
</body>
</html>
